name: Critique Auto Review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

jobs:
  auto-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Run Critique auto-review action
        uses: ./.github/actions/critique
        with:
          backend_url: ${{ secrets.CRITIQUE_BACKEND_URL }}
