name: "Critique Auto-Review"
description: "Composite action that runs the Critique auto-review on pull requests"
inputs:
  backend_url:
    description: 'Full URL to the Critique backend (e.g. https://critique.example.com)'
    required: true
  github_token:
    description: 'GitHub token used for PR file access and comments'
    required: true
  backend_key:
    description: 'Optional API key for authenticating with the backend'
    required: false
runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install action dependencies
      run: npm ci --prefix ./.github/actions/critique
      shell: bash

    - name: Run Critique auto-review
      run: node ./.github/actions/critique/run.js
      shell: bash
      env:
        BACKEND_URL: ${{ inputs.backend_url }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        CRITIQUE_BACKEND_KEY: ${{ inputs.backend_key != '' && inputs.backend_key || '' }}
