name: "Critique PR Auto-Review"
description: "Composite action used by the PR workflow to run Critique reviews"
inputs:
  backend_url:
    description: 'Full URL to the Critique backend (e.g. https://critique.example.com)'
    required: true
  github_token:
    description: 'GitHub token used for PR file access and comments'
    required: true
  backend_key:
    description: 'Optional API key for authenticating with the backend'
    required: false
runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install action dependencies
      working-directory: ${{ github.action_path }}
      run: npm ci
      shell: bash

    - name: Run Critique auto-review
      working-directory: ${{ github.action_path }}
      run: node run.js
      shell: bash
      env:
        BACKEND_URL: ${{ inputs.backend_url }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        CRITIQUE_BACKEND_KEY: ${{ inputs.backend_key != '' && inputs.backend_key || '' }}
