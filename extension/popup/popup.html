<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Critique</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="badge">Critique</div>
        <h1>Critique settings</h1>
        <p>Choose how Critique behaves across GitHub.</p>
      </section>

      <form id="settingsForm" class="card">
        <label for="backendUrl">Backend URL</label>
        <input id="backendUrl" name="backendUrl" type="url" placeholder="http://localhost:3001" autocomplete="url" spellcheck="false" required />

        <fieldset>
          <legend>Features</legend>
          <label class="toggle"><input id="summarizerEnabled" type="checkbox" /> <span>README summarizer</span></label>
          <label class="toggle"><input id="commitRaterEnabled" type="checkbox" /> <span>Commit message rater</span></label>
          <label class="toggle"><input id="explainerEnabled" type="checkbox" /> <span>Code explainer on hover</span></label>
        </fieldset>

        <label for="reviewDepth">Review depth</label>
        <select id="reviewDepth" name="reviewDepth">
          <option value="quick">Quick</option>
          <option value="standard">Standard</option>
          <option value="deep">Deep</option>
        </select>

        <div class="actions">
          <button type="submit">Save</button>
          <span id="status" role="status" aria-live="polite"></span>
        </div>
      </form>

      <p class="hint">Tip: use your local backend while developing, then swap in the deployed URL later.</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
